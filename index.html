<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>TEE ISTORE Enterprise | Best & Quality Gadgets</title>
    <style>
        :root {
            --deep-brown: #5C2E16;
            --chocolate: #7B3F1A;
            --golden-brown: #A0522D;
            --light-golden: #C4956A;
            --cream: #F5DEB3;
            --white-cream: #FFFAF0;
            --white: #FFFFFF;
            --glass-bg: rgba(255, 255, 255, 0.22);
            --glass-border: rgba(255, 255, 255, 0.45);
            --glass-shadow: rgba(92, 46, 22, 0.18);
            --text-dark: #2C1810;
            --text-medium: #4A2A18;
            --text-light: #6B3A2A;
            --accent: #B8650A;
            --danger: #C0392B;
            --success: #2E7D32;
            --star-gold: #D4A017;
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, sans-serif;
            background: radial-gradient(ellipse at 50% 40%, #FFFAF0 0%, #F5DEB3 22%, #D4A574 48%, #B0703A 68%, #7B3F1A 85%, #5C2E16 100%);
            background-attachment: fixed;
            min-height: 100vh;
            color: var(--text-dark);
            position: relative;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            -webkit-tap-highlight-color: transparent;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse at 50% 30%, rgba(255, 255, 255, 0.35) 0%, transparent 60%),
                radial-gradient(ellipse at 50% 70%, rgba(255, 255, 255, 0.25) 0%, transparent 55%),
                radial-gradient(ellipse at 30% 50%, rgba(210, 160, 120, 0.3) 0%, transparent 50%),
                radial-gradient(ellipse at 70% 50%, rgba(210, 160, 120, 0.3) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        body::after {
            content: '';
            position: fixed;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.5) 0%, transparent 70%);
            border-radius: 50%;
            top: 15%;
            left: 60%;
            filter: blur(40px);
            pointer-events: none;
            z-index: 0;
            animation: floatGlass 8s ease-in-out infinite;
        }

        @keyframes floatGlass {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(-30px, 20px) scale(1.1); }
            50% { transform: translate(20px, -15px) scale(0.9); }
            75% { transform: translate(-10px, -25px) scale(1.05); }
        }

        .app-container {
            position: relative;
            z-index: 1;
            max-width: 1300px;
            margin: 0 auto;
            padding: 10px 16px 30px;
        }

        .header {
            position: sticky;
            top: 10px;
            z-index: 100;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1.5px solid var(--glass-border);
            border-radius: 20px;
            padding: 16px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 14px;
            box-shadow: 0 12px 40px var(--glass-shadow), 0 4px 16px rgba(0, 0, 0, 0.06);
            margin-bottom: 10px;
        }

        .logo-section {
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            text-decoration: none;
        }

        .logo-icon {
            width: 48px;
            height: 48px;
            border-radius: 14px;
            background: linear-gradient(135deg, #8B4513, #D4A574);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            box-shadow: 0 6px 18px rgba(139, 69, 19, 0.35);
        }

        .logo-text h1 {
            font-size: 1.25rem;
            font-weight: 800;
            color: #3E1A08;
            letter-spacing: -0.3px;
            line-height: 1.1;
        }
        .logo-text span {
            font-size: 0.7rem;
            font-weight: 500;
            color: #6B3A2A;
            letter-spacing: 0.6px;
            text-transform: uppercase;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 10px 18px;
            border-radius: 30px;
            border: 1.5px solid transparent;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            letter-spacing: 0.2px;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 7px;
            text-decoration: none;
            white-space: nowrap;
            background: rgba(255,255,255,0.3);
            backdrop-filter: blur(8px);
            color: #3E1A08;
            border-color: rgba(255,255,255,0.5);
        }
        .btn:hover { background: rgba(255,255,255,0.55); transform: translateY(-2px); }
        .btn-solid {
            background: linear-gradient(135deg, #8B4513, #A0522D);
            color: #FFF;
            border-color: #8B4513;
        }
        .btn-outline {
            background: transparent;
            border-color: #8B4513;
            color: #5C2E16;
        }
        .btn-sm {
            padding: 6px 14px;
            font-size: 0.78rem;
            border-radius: 22px;
        }
        .btn-icon {
            width: 42px; height: 42px; border-radius: 50%; padding: 0; justify-content: center;
        }
        .cart-badge {
            position: absolute; top: -6px; right: -6px;
            background: #C0392B; color: #FFF; width: 22px; height: 22px;
            border-radius: 50%; font-size: 0.7rem; font-weight: 700;
            display: flex; align-items: center; justify-content: center;
            border: 2px solid #FFF;
        }
        .hidden { display: none !important; }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 18px;
            margin-bottom: 20px;
        }

        .product-card {
            background: var(--glass-bg);
            backdrop-filter: blur(14px);
            border: 1.5px solid var(--glass-border);
            border-radius: 18px;
            overflow: hidden;
            cursor: pointer;
            transition: var(--transition);
        }
        .product-card:hover { transform: translateY(-5px); }
        .product-img-wrap {
            position: relative;
            aspect-ratio: 1/1;
            overflow: hidden;
            background: rgba(200,170,140,0.3);
        }
        .product-img-wrap img {
            width: 100%; height: 100%; object-fit: cover;
            transition: transform 0.45s;
        }
        .product-card:hover .product-img-wrap img { transform: scale(1.06); }

        /* Fullscreen image viewer */
        .fullscreen-viewer {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.92);
            z-index: 300;
            display: flex;
            align-items: center;
            justify-content: center;
            touch-action: pan-y pinch-zoom;
        }
        .fullscreen-viewer img {
            max-width: 95vw;
            max-height: 90vh;
            object-fit: contain;
            transition: opacity 0.2s;
        }
        .viewer-close {
            position: absolute;
            top: 20px;
            right: 25px;
            font-size: 2.2rem;
            color: #fff;
            z-index: 10;
            background: none;
            border: none;
            cursor: pointer;
        }
        .viewer-nav {
            position: absolute;
            top: 50%; transform: translateY(-50%);
            font-size: 2.4rem;
            color: rgba(255,255,255,0.7);
            background: none;
            border: none;
            padding: 12px;
            cursor: pointer;
        }
        .viewer-prev { left: 10px; }
        .viewer-next { right: 10px; }

        @media (max-width: 600px) {
            .product-grid { grid-template-columns: 1fr 1fr; gap: 10px; }
            .btn { padding: 8px 12px; font-size: 0.75rem; }
        }
    </style>
</head>
<body>
<div class="app-container">
    <header class="header">
        <a class="logo-section" onclick="showHome()">
            <div class="logo-icon">📱</div>
            <div class="logo-text"><h1>TEE ISTORE</h1><span>Enterprise</span></div>
        </a>
        <div style="display:flex; align-items:center; gap:8px; flex-wrap:wrap;">
            <button class="btn btn-sm" onclick="showHome()">🏠 Home</button>
            <button class="btn btn-icon btn-sm" onclick="showCart()" style="position:relative;">
                🛒 <span class="cart-badge hidden" id="cartBadge">0</span>
            </button>
            <button class="btn btn-sm" onclick="showCheckout()">💳 Checkout</button>
            <a href="#" class="btn btn-sm" onclick="promptAdminLogin()">🔑 Admin</a>
        </div>
    </header>

    <div id="homeSection">
        <h2 class="section-title" style="margin:20px 0 14px;">🔥 Featured Gadgets</h2>
        <div class="product-grid" id="productGrid"></div>
    </div>

    <div id="cartSection" class="hidden">
        <h2 class="section-title">🛒 Cart</h2>
        <div id="cartItemsContainer"></div>
        <div id="cartSummary" class="hidden" style="margin-top:20px;">
            <p><strong>Total:</strong> <span id="cartTotal">₦0</span></p>
            <button class="btn btn-solid" onclick="showCheckout()">Proceed to Checkout</button>
        </div>
    </div>

    <div id="checkoutSection" class="hidden">
        <h2 class="section-title">💳 Checkout</h2>
        <div id="checkoutContent">
            <div id="checkoutItems"></div>
            <p><strong>Grand Total:</strong> <span id="checkoutTotal">₦0</span></p>
            <button class="btn btn-solid" onclick="checkoutViaWhatsApp()">💬 Order via WhatsApp</button>
            <button class="btn" onclick="copyOrderDetails()">📋 Copy Details</button>
        </div>
    </div>

    <footer style="margin-top:30px; text-align:center; font-size:0.8rem; color:#5C2E16;">
        <p><strong>TEE ISTORE Enterprise</strong> – WE OFFER BEST AND QUALITY GADGETS</p>
        <p>📍 19th street junction opposite University of Benin</p>
        <p>
            📞 <a href="tel:09061490246">09061490246</a> |
            💬 <a href="https://wa.me/2348110602126">WhatsApp</a> |
            📷 <a href="https://instagram.com/tee_istore_enterprise">@tee_istore_enterprise</a> |
            🎵 <a href="https://tiktok.com/@tee_istore_enterprise">TikTok</a>
        </p>
    </footer>
</div>

<!-- Fullscreen image viewer (hidden) -->
<div id="fullscreenViewer" class="fullscreen-viewer hidden" onclick="closeFullscreenViewer()">
    <button class="viewer-close" onclick="closeFullscreenViewer()">✕</button>
    <button class="viewer-nav viewer-prev" onclick="event.stopPropagation(); navigateViewer(-1)">‹</button>
    <img id="viewerImage" src="" alt="product image" onclick="event.stopPropagation()">
    <button class="viewer-nav viewer-next" onclick="event.stopPropagation(); navigateViewer(1)">›</button>
</div>

<script>
    const STORE_NAME = 'TEE ISTORE Enterprise';
    const STORE_WHATSAPP = '2348110602126';
    const ADMIN_PASSWORD = 'teeistore';
    let products = JSON.parse(localStorage.getItem('teeistore_products')) || [
        { id:1, name:'iPhone 15 Pro Max', price:1850000, description:'Brand new, 256GB', images:['https://picsum.photos/seed/ip1/600'], category:'phones', inStock:true, featured:true, reviews:[] },
        { id:2, name:'Samsung S24 Ultra', price:1650000, description:'512GB, Titanium', images:['https://picsum.photos/seed/s24/600'], category:'phones', inStock:true, featured:true, reviews:[] },
        { id:3, name:'AirPods Pro 2', price:280000, description:'USB-C, ANC', images:['https://picsum.photos/seed/airpods/600'], category:'accessories', inStock:true, featured:false, reviews:[] }
    ];

    function saveProducts() { localStorage.setItem('teeistore_products', JSON.stringify(products)); }
    function getCart() { return JSON.parse(localStorage.getItem('teeistore_cart') || '[]'); }
    function saveCart(cart) { localStorage.setItem('teeistore_cart', JSON.stringify(cart)); updateCartBadge(); }
    function addToCart(id) {
        let cart = getCart(); let item = cart.find(i=>i.productId===id);
        if(item) item.qty++; else cart.push({productId:id,qty:1});
        saveCart(cart); showToast('Added to cart ✅');
    }
    function removeFromCart(id) {
        let cart = getCart().filter(i=>i.productId!==id);
        saveCart(cart); if(!document.getElementById('cartSection').classList.contains('hidden')) renderCart();
    }
    function updateCartQty(id, delta) {
        let cart = getCart(); let item = cart.find(i=>i.productId===id);
        if(item) { item.qty+=delta; if(item.qty<=0) cart=cart.filter(i=>i.productId!==id); }
        saveCart(cart); if(!document.getElementById('cartSection').classList.contains('hidden')) renderCart();
    }
    function updateCartBadge() {
        let total = getCart().reduce((s,i)=>s+i.qty,0);
        let badge = document.getElementById('cartBadge');
        badge.textContent = total; badge.classList.toggle('hidden', total===0);
    }

    function renderProducts() {
        let grid = document.getElementById('productGrid');
        grid.innerHTML = products.map(p=>`
            <div class="product-card" onclick="openProductDetail(${p.id})">
                <div class="product-img-wrap">
                    <img src="${p.images[0]}" alt="${p.name}" onclick="event.stopPropagation(); openFullscreenGallery(${p.id}, 0)">
                </div>
                <div style="padding:12px;">
                    <h4>${p.name}</h4>
                    <p style="font-weight:bold;">₦${p.price.toLocaleString()}</p>
                    <button class="btn btn-solid btn-sm" onclick="event.stopPropagation(); addToCart(${p.id})">Add to Cart</button>
                </div>
            </div>`).join('');
    }

    // Fullscreen image viewer with swipe
    let currentViewerProductId = null;
    let currentViewerIndex = 0;
    function openFullscreenGallery(productId, index) {
        const product = products.find(p=>p.id===productId);
        if(!product || !product.images.length) return;
        currentViewerProductId = productId;
        currentViewerIndex = index;
        document.getElementById('viewerImage').src = product.images[index];
        document.getElementById('fullscreenViewer').classList.remove('hidden');
        document.body.style.overflow = 'hidden';
    }
    function closeFullscreenViewer() {
        document.getElementById('fullscreenViewer').classList.add('hidden');
        document.body.style.overflow = '';
    }
    function navigateViewer(direction) {
        const product = products.find(p=>p.id===currentViewerProductId);
        if(!product) return;
        let newIndex = currentViewerIndex + direction;
        if(newIndex < 0) newIndex = product.images.length-1;
        if(newIndex >= product.images.length) newIndex = 0;
        currentViewerIndex = newIndex;
        document.getElementById('viewerImage').src = product.images[newIndex];
    }

    // Touch swipe for viewer
    let touchStartX = 0;
    document.getElementById('fullscreenViewer').addEventListener('touchstart', e => {
        touchStartX = e.changedTouches[0].screenX;
    });
    document.getElementById('fullscreenViewer').addEventListener('touchend', e => {
        if(!touchStartX) return;
        let diff = e.changedTouches[0].screenX - touchStartX;
        if(Math.abs(diff) > 40) navigateViewer(diff > 0 ? -1 : 1);
        touchStartX = 0;
    });

    // Product detail modal (simplified, relies on fullscreen viewer for images)
    function openProductDetail(id) {
        let p = products.find(p=>p.id===id);
        if(!p) return;
        alert(`${p.name}\n₦${p.price.toLocaleString()}\n${p.description}\n\nTap images for full view.`);
        openFullscreenGallery(id, 0);
    }

    function showHome() {
        document.getElementById('homeSection').classList.remove('hidden');
        document.getElementById('cartSection').classList.add('hidden');
        document.getElementById('checkoutSection').classList.add('hidden');
        renderProducts();
    }
    function showCart() {
        document.getElementById('homeSection').classList.add('hidden');
        document.getElementById('cartSection').classList.remove('hidden');
        document.getElementById('checkoutSection').classList.add('hidden');
        renderCart();
    }
    function renderCart() {
        let cart = getCart();
        let container = document.getElementById('cartItemsContainer');
        let summary = document.getElementById('cartSummary');
        container.innerHTML = '';
        if(cart.length===0) { summary.classList.add('hidden'); return; }
        let total = 0;
        cart.forEach(item=>{
            let p = products.find(p=>p.id===item.productId);
            if(!p) return;
            total += p.price*item.qty;
            container.innerHTML += `<div style="display:flex; gap:10px; align-items:center;">
                <img src="${p.images[0]}" style="width:50px;height:50px;object-fit:cover;border-radius:8px;">
                <span>${p.name} x${item.qty}</span>
                <button onclick="updateCartQty(${p.id},-1)">-</button>
                <span>₦${(p.price*item.qty).toLocaleString()}</span>
                <button onclick="removeFromCart(${p.id})">🗑</button>
            </div>`;
        });
        document.getElementById('cartTotal').textContent = '₦'+total.toLocaleString();
        summary.classList.remove('hidden');
    }
    function showCheckout() {
        document.getElementById('homeSection').classList.add('hidden');
        document.getElementById('cartSection').classList.add('hidden');
        document.getElementById('checkoutSection').classList.remove('hidden');
        let cart = getCart();
        let itemsDiv = document.getElementById('checkoutItems');
        let total=0;
        itemsDiv.innerHTML = '';
        cart.forEach(item=>{
            let p = products.find(p=>p.id===item.productId);
            if(!p) return;
            total += p.price*item.qty;
            itemsDiv.innerHTML += `<p>${p.name} x${item.qty} = ₦${(p.price*item.qty).toLocaleString()}</p>`;
        });
        document.getElementById('checkoutTotal').textContent = '₦'+total.toLocaleString();
    }
    function checkoutViaWhatsApp() {
        let cart = getCart();
        if(!cart.length) return;
        let msg = `🛒 *TEE ISTORE Order*%0A`;
        let total=0;
        cart.forEach((item,i)=>{
            let p = products.find(p=>p.id===item.productId);
            if(!p) return;
            total += p.price*item.qty;
            msg += `${i+1}. ${p.name} x${item.qty} = ₦${(p.price*item.qty).toLocaleString()}%0A`;
        });
        msg += `%0A*Total: ₦${total.toLocaleString()}*%0A📍 19th st junction, UNIBEN`;
        window.open(`https://wa.me/${STORE_WHATSAPP}?text=${msg}`, '_blank');
    }
    function copyOrderDetails() {
        let cart = getCart();
        let text = `TEE ISTORE Order:\n`;
        cart.forEach(item=>{
            let p = products.find(p=>p.id===item.productId);
            text += `${p.name} x${item.qty}\n`;
        });
        navigator.clipboard.writeText(text).then(()=>showToast('Copied!'));
    }

    function showToast(msg) {
        let toast = document.createElement('div');
        toast.textContent = msg; toast.style.cssText = 'position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:#3E1A08; color:#fff; padding:12px 24px; border-radius:30px; z-index:999;';
        document.body.appendChild(toast);
        setTimeout(()=>toast.remove(), 2000);
    }

    // Admin with gallery upload
    function promptAdminLogin() {
        let pwd = prompt('Admin password:');
        if(pwd === ADMIN_PASSWORD) showAdminPanel();
        else if(pwd) alert('Wrong password');
    }

    function showAdminPanel() {
        document.getElementById('homeSection').classList.add('hidden');
        document.getElementById('cartSection').classList.add('hidden');
        document.getElementById('checkoutSection').classList.add('hidden');
        let panel = document.getElementById('adminPanel');
        if(!panel) {
            panel = document.createElement('div'); panel.id = 'adminPanel';
            panel.style.cssText = 'background:rgba(255,250,240,0.9); backdrop-filter:blur(20px); border-radius:20px; padding:20px; margin:10px 0;';
            document.querySelector('.app-container').appendChild(panel);
        }
        panel.innerHTML = `
            <h2>🔐 Admin Panel</h2>
            <div style="background:rgba(255,255,255,0.6); padding:16px; border-radius:16px; margin-bottom:16px;">
                <h3>➕ Add Product</h3>
                <input id="newName" placeholder="Product name" style="width:100%; padding:8px; margin:4px 0;"><br>
                <input id="newPrice" type="number" placeholder="Price (₦)" style="width:100%; padding:8px; margin:4px 0;"><br>
                <textarea id="newDesc" placeholder="Description" style="width:100%; padding:8px;"></textarea><br>
                <label>📸 Product Images:</label><br>
                <input type="file" id="imageFiles" multiple accept="image/*" style="margin:6px 0;"><br>
                <div id="imagePreview" style="display:flex; gap:6px; flex-wrap:wrap;"></div>
                <small>or paste image URLs (comma separated):</small><br>
                <input id="imageUrls" placeholder="https://...jpg, https://..." style="width:100%; padding:8px;"><br>
                <button class="btn btn-solid" onclick="addProductFromAdmin()">Add Product</button>
            </div>
            <h3>📦 Products (tap to delete)</h3>
            <div id="adminProductList"></div>
            <button class="btn" onclick="showHome()">Back to Store</button>
        `;
        renderAdminProductList();
        panel.classList.remove('hidden');
        // Handle file selection preview
        document.getElementById('imageFiles').addEventListener('change', function(e) {
            let preview = document.getElementById('imagePreview');
            preview.innerHTML = '';
            Array.from(e.files).forEach(file => {
                let reader = new FileReader();
                reader.onload = ev => {
                    let img = document.createElement('img');
                    img.src = ev.target.result;
                    img.style = 'width:60px; height:60px; object-fit:cover; border-radius:8px;';
                    preview.appendChild(img);
                };
                reader.readAsDataURL(file);
            });
        });
    }

    async function addProductFromAdmin() {
        let name = document.getElementById('newName').value.trim();
        let price = parseInt(document.getElementById('newPrice').value);
        let desc = document.getElementById('newDesc').value.trim();
        if(!name || !price) return alert('Name and price required.');
        let imageUrls = [];
        // Get from file input (data URLs)
        let fileInput = document.getElementById('imageFiles');
        if(fileInput.files.length > 0) {
            for(let file of fileInput.files) {
                let dataUrl = await readFileAsDataURL(file);
                imageUrls.push(dataUrl);
            }
        }
        // Also from URL text
        let urlText = document.getElementById('imageUrls').value.trim();
        if(urlText) {
            imageUrls.push(...urlText.split(',').map(u=>u.trim()).filter(u=>u));
        }
        if(imageUrls.length===0) imageUrls.push('https://picsum.photos/seed/'+Date.now()+'/600');
        let newId = Math.max(0, ...products.map(p=>p.id)) + 1;
        products.push({ id:newId, name, price, description:desc, images:imageUrls, category:'general', inStock:true, featured:false, reviews:[] });
        saveProducts();
        renderAdminProductList();
        showHome();
        showToast('Product added!');
    }

    function readFileAsDataURL(file) {
        return new Promise(resolve => {
            let reader = new FileReader();
            reader.onload = () => resolve(reader.result);
            reader.readAsDataURL(file);
        });
    }

    function renderAdminProductList() {
        let list = document.getElementById('adminProductList');
        if(!list) return;
        list.innerHTML = products.map(p=>`
            <div style="display:flex; align-items:center; gap:8px; padding:6px; background:rgba(255,255,255,0.5); border-radius:8px; margin:4px 0;">
                <img src="${p.images[0]}" style="width:40px;height:40px;object-fit:cover;border-radius:6px;">
                <span>${p.name} - ₦${p.price}</span>
                <button class="btn btn-sm" style="background:#C0392B;color:#fff;" onclick="deleteProduct(${p.id})">🗑</button>
            </div>`).join('');
    }

    function deleteProduct(id) {
        if(confirm('Delete this product?')) {
            products = products.filter(p=>p.id!==id);
            saveProducts();
            renderAdminProductList();
            showHome();
        }
    }

    // Init
    updateCartBadge();
    renderProducts();
</script>
</body>
</html>
